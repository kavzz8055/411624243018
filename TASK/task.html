<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Web Design Assignment</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="task.css">
</head>

<body>

<!-- Navbar -->
<nav>
    <a href="https://www.google.com" target="_blank">Home</a>
    <a href="https://www.wikipedia.org" target="_blank">About</a>
    <a href="https://github.com" target="_blank">Contact</a>
</nav>

<!-- Heading -->
<h1>Responsive Website</h1>

<!-- Image -->
<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800"
     alt="Beautiful Nature Landscape">

<!-- Video -->
<video controls>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    
</video>

<!-- Table -->
<table>
    <tr>
        <th>1</th>
        <th>2</th>
        <th>3</th>
    </tr>
    <tr>
        <td>Nature</td>
        <td>Beautiful Mountain View</td>
        <td>Fresh Environment</td>
    </tr>
    <tr>
        <td>Video</td>
        <td>Sample Wildlife Clip</td>
        <td>Responsive Design</td>
    </tr>
</table>

<!-- Button -->
<button onclick="alert('Welcome to Responsive Website!')">
    Click Me
</button>

<!-- Grid -->
<div class="grid-container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
    <div class="box">6</div>
    <div class="box">7</div>
    <div class="box">8</div>
</div>

</body>
</html>
